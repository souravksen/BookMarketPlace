# ===========================
# Server Configuration
# ===========================
server.port=8085
server.servlet.context-path=/

# ===========================
# Database Configuration
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/bookmarketplace?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=YOUR_JWT_SECRET
app.jwt.expiration-ms=86400000

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/books

# ===========================
# Logging
# ===========================
logging.level.com.bookmarketplace=DEBUG
logging.level.org.springframework.security=INFO
